name: Bump CatalogueCanvas version

# yamllint disable-line rule:truthy
on:
  repository_dispatch:
    types: [cc-release]
  workflow_dispatch:
    inputs:
      version:
        description: "CatalogueCanvas version tag"
        required: true
        type: string

permissions:
  contents: read

jobs:
  bump:
    name: Bump cataloguecanvas/config.yaml
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Compute new add-on version
        id: version
        run: |
          raw_version="${{ github.event.client_payload.version || inputs.version }}"
          app_version="${raw_version#v}"

          if ! [[ "${app_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Received version '${raw_version}' does not look like a semver app version, refusing to bump config.yaml"
            exit 1
          fi

          current_version=$(yq -r '.version' cataloguecanvas/config.yaml)
          current_app_version="${current_version%-*}"

          if [ "${current_app_version}" = "${app_version}" ]; then
            echo "config.yaml already tracks app version ${app_version}, skipping"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          new_version="${app_version}-1"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Update config.yaml
        if: steps.version.outputs.changed == 'true'
        run: |
          yq -i '.version = "${{ steps.version.outputs.new_version }}"' cataloguecanvas/config.yaml

      - name: Update CHANGELOG.md
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          changelog=cataloguecanvas/CHANGELOG.md
          upstream=$(mktemp)
          body=$(mktemp)
          entry=$(mktemp)

          if ! gh api "repos/CatalogueCanvas/CatalogueCanvas/contents/CHANGELOG.md?ref=v${APP_VERSION}" \
              --jq .content 2>/dev/null | base64 -d > "${upstream}" 2>/dev/null; then
            : > "${upstream}"
          fi

          awk -v v="${APP_VERSION}" \
            'index($0, "## [" v "]") == 1 { f = 1; next } /^## / { f = 0 } f' \
            "${upstream}" > "${body}"

          if ! grep -q '[^[:space:]]' "${body}"; then
            echo "::warning::No upstream changelog section found for v${APP_VERSION}, writing stub entry"
            {
              echo
              echo "### Changed"
              echo "- Updated bundled CatalogueCanvas to [v${APP_VERSION}](https://github.com/CatalogueCanvas/CatalogueCanvas/blob/v${APP_VERSION}/CHANGELOG.md)."
            } > "${body}"
          fi

          {
            echo "## ${NEW_VERSION}"
            echo
            echo "Tracks upstream CatalogueCanvas [v${APP_VERSION}](https://github.com/CatalogueCanvas/CatalogueCanvas/blob/v${APP_VERSION}/CHANGELOG.md)."
            cat "${body}"
          } > "${entry}"

          # Insert the new entry directly above the current top-most "## " section.
          awk -v entry="${entry}" \
            '!done && /^## / { while ((getline line < entry) > 0) print line; done = 1 } { print }' \
            "${changelog}" > "${changelog}.new"
          mv "${changelog}.new" "${changelog}"

      - name: Open pull request
        if: steps.version.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.BUMP_PAT }}
          commit-message: "Bump CatalogueCanvas to v${{ steps.version.outputs.app_version }}"
          title: "Bump CatalogueCanvas to v${{ steps.version.outputs.app_version }}"
          body: |
            CatalogueCanvas released `v${{ steps.version.outputs.app_version }}`.

            This bumps `cataloguecanvas/config.yaml` to
            `${{ steps.version.outputs.new_version }}`, resetting the add-on
            build counter to 1 for the new app version.
          branch: bump-cc-v${{ steps.version.outputs.app_version }}
          add-paths: |
            cataloguecanvas/config.yaml
            cataloguecanvas/CHANGELOG.md
