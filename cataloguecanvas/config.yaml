name: CatalogueCanvas
version: "0.1.0"
slug: cataloguecanvas
description: Self-hosted digital asset manager (FastAPI + React SPA) for organising artwork, generative code and design assets
url: https://github.com/CatalogueCanvas/CatalogueCanvas
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: Web UI (http://<ha-host>:8000)
map:
  - type: media
    read_only: false
  - type: share
    read_only: false
  - type: homeassistant_config
    read_only: true
options:
  admin_password: ""
  admin_username: admin
  site_title: CatalogueCanvas
  site_author: ""
  cookie_secure: false
  llm_allowed_hosts: ""
  max_upload_bytes: 1073741824
schema:
  admin_password: password
  admin_username: str
  site_title: str
  site_author: str?
  cookie_secure: bool
  llm_allowed_hosts: str?
  max_upload_bytes: int(0,)
